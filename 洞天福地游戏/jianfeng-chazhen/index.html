<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>剑锋插阵</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#08111f" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <canvas id="arena" aria-label="剑锋插阵"></canvas>

    <main class="shell">
      <header class="hud">
        <div class="hud-block">
          <span>剩余</span>
          <strong id="time">90.0</strong>
        </div>
        <div class="phase">
          <span id="phase">试剑入阵</span>
          <b id="burst">万剑归宗</b>
        </div>
        <div class="hud-block right">
          <span>剑意</span>
          <strong id="score">0</strong>
        </div>
      </header>

      <section class="stats" aria-live="polite">
        <div><span>破阵</span><strong id="formations">0</strong></div>
        <div><span>插剑</span><strong id="swords">0</strong></div>
        <div><span>天隙</span><strong id="gaps">0</strong></div>
        <div><span>连斩</span><strong id="combo">0</strong></div>
        <div><span>护心</span><strong id="shields">3</strong></div>
      </section>

      <button class="settle" id="settle" type="button">结算本局</button>
    </main>

    <div class="toast" id="toast"></div>
    <div class="fx-layer" id="fx-layer" aria-hidden="true"></div>

    <section class="overlay show" id="menu">
      <div class="panel">
        <p>洞天福地</p>
        <h1>剑锋插阵</h1>
        <span>点落飞剑，避开旧痕。最后三十息，万剑归宗。</span>
        <button id="start" type="button">开始本局</button>
      </div>
    </section>

    <section class="overlay" id="result">
      <div class="panel panel-result">
        <p id="result-kicker">剑阵归鞘</p>
        <h1 id="result-title">本局结算</h1>
        <div class="result-lines" id="result-lines"></div>
        <button id="copy" type="button" disabled>复制兑换命令</button>
        <button id="again" type="button">再开一局</button>
      </div>
    </section>

    <script src="js/app.js"></script>
  </body>
</html>
