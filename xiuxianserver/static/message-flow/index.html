<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>消息流水</title>
  <link rel="stylesheet" href="/static/message-flow/style.css">
</head>
<body>
  <script>
    window.MESSAGE_FLOW_CONFIG = __MESSAGE_FLOW_CONFIG__;
  </script>

  <main class="app-shell">
    <header class="topbar">
      <h1>消息流水</h1>
      <div class="font-control" role="group" aria-label="字体大小">
        <button id="fontSizeDown" class="font-button" type="button" aria-label="缩小字体" title="缩小字体">−</button>
        <span id="fontSizeLabel" class="font-label">中</span>
        <button id="fontSizeUp" class="font-button" type="button" aria-label="放大字体" title="放大字体">＋</button>
      </div>
      <div class="status-strip">
        <span id="statusBadge" class="status-badge is-idle">初始化</span>
        <button id="jumpBottom" class="jump-bottom" type="button" aria-label="到底" title="到底">↓</button>
      </div>
    </header>

    <section class="flow-stage" aria-label="消息流水列表">
      <div id="flowList" class="flow-list" aria-live="polite"></div>
    </section>
  </main>

  <script src="/static/message-flow/app.js" defer></script>
</body>
</html>
