<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>灵牌记忆</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151c;
      --panel: #18212b;
      --panel-2: #202b36;
      --line: rgba(255,255,255,.12);
      --text: #f6f1e7;
      --muted: #aeb8c4;
      --accent: #77d6b2;
      --accent-2: #f3c969;
      --bad: #ff8c8c;
      --card: #283646;
      --card-back: linear-gradient(145deg, #244556, #1a2936);
      --app-height: 100dvh;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      min-height: var(--app-height);
      display: grid;
      place-items: center;
      padding: clamp(8px, 1.8vh, 16px);
      touch-action: manipulation;
    }
    main {
      width: min(560px, calc(100vw - 20px));
      height: calc(var(--app-height) - clamp(16px, 3.6vh, 32px));
      max-height: 760px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      gap: clamp(6px, 1.1vh, 12px);
      min-height: 0;
    }
    .top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-end; min-width: 0; }
    .top > div { min-width: 0; }
    h1 { margin: 0 0 4px; font-size: clamp(24px, 5vh, 42px); line-height: 1; letter-spacing: 0; }
    .sub { margin: 0; color: var(--muted); font-size: 14px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(5px, 1vh, 8px); }
    .stat { min-height: 0; padding: clamp(6px, 1.2vh, 10px); border: 1px solid var(--line); background: var(--panel); border-radius: 8px; text-align: center; }
    .stat b { display: block; font-size: clamp(16px, 3vh, 20px); color: var(--accent); }
    .stat span { color: var(--muted); font-size: 12px; }
    .board {
      width: min(100%, calc((var(--app-height) - 216px) * 0.9), 520px);
      max-height: 100%;
      min-height: 0;
      aspect-ratio: 1;
      align-self: center;
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(4px, 1vh, 8px);
    }
    .card {
      width: 100%;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card-back);
      color: var(--text);
      font-size: clamp(16px, 3vh, 24px);
      font-weight: 800;
      letter-spacing: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
      touch-action: manipulation;
    }
    .card:active { transform: scale(.97); }
    .card.open { background: #f7ead4; color: #20242a; border-color: rgba(243,201,105,.72); }
    .card.done { background: rgba(119,214,178,.18); border-color: rgba(119,214,178,.74); color: var(--accent); cursor: default; }
    .actions { display: flex; gap: 10px; }
    button.action {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #0d1716;
      font-weight: 800;
      padding: 12px 16px;
      min-height: 44px;
      cursor: pointer;
      flex: 1;
    }
    button.action.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
    button.action:disabled { opacity: .55; cursor: not-allowed; }
    .result {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(5, 8, 12, .68);
      backdrop-filter: blur(8px);
    }
    .result.show { display: grid; }
    .result-card {
      width: min(430px, 100%);
      max-height: calc(var(--app-height) - 32px);
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 18px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .42);
    }
    .result-card h2 { margin: 0 0 8px; font-size: 24px; }
    .result-desc { margin: 0 0 12px; color: var(--muted); line-height: 1.6; }
    .code-label { color: var(--muted); font-size: 12px; font-weight: 800; }
    .code {
      margin-top: 4px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,.24);
      font-size: 20px;
      font-weight: 900;
      color: var(--accent-2);
      word-break: break-all;
    }
    .command {
      margin-top: 8px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 800;
      word-break: break-all;
    }
    .rewards { margin: 8px 0 0; padding-left: 18px; color: var(--muted); }
    .copy-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .result-card > .action { margin-top: 8px; width: 100%; }
    .error { color: var(--bad); }
    .inline-status {
      min-height: 22px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 420px) {
      body { padding: 8px; }
      main {
        width: calc(100vw - 16px);
        height: calc(var(--app-height) - 16px);
        gap: 7px;
      }
      .top { align-items: center; }
      .stats { gap: 6px; }
      .stat { padding: 8px 4px; }
      .board { gap: 6px; }
      .copy-actions { grid-template-columns: 1fr; }
    }

    @media (max-width: 340px) {
      .actions { flex-direction: column; }
    }

    @media (max-height: 640px) {
      h1 { font-size: 24px; }
      .sub { display: none; }
      .stat { padding: 6px 4px; }
      button.action { min-height: 38px; padding: 8px 12px; }
      .inline-status { min-height: 18px; font-size: 12px; line-height: 1.35; }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <div>
        <h1>灵牌记忆</h1>
        <p class="sub">翻开相同灵牌，九十息内尽量归位。</p>
      </div>
      <button class="action secondary" id="restart" type="button" disabled>重开</button>
    </section>

    <section class="stats" aria-live="polite">
      <div class="stat"><b id="time">90</b><span>剩余</span></div>
      <div class="stat"><b id="pairs">0/8</b><span>配对</span></div>
      <div class="stat"><b id="flips">0</b><span>翻牌</span></div>
    </section>

    <section class="board" id="board" aria-label="灵牌棋盘"></section>

    <section class="actions">
      <button class="action" id="start" type="button" disabled>开局</button>
      <button class="action secondary" id="finish" type="button" disabled>结算本局</button>
    </section>
    <p class="inline-status" id="status">正在叩问洞天入口。</p>

    <section class="result" id="result" aria-live="polite"></section>
  </main>

  <script>
    const API = "/xiuxian/dongtian/lingpai-memory";
    const state = {
      config: null,
      round: null,
      cards: [],
      open: [],
      matched: new Set(),
      flips: 0,
      startedAt: 0,
      timer: null,
      finished: false,
      duration: 90,
      minSettleSeconds: 10,
      pendingFinishTimer: null
    };

    const els = {
      board: document.getElementById("board"),
      start: document.getElementById("start"),
      finish: document.getElementById("finish"),
      restart: document.getElementById("restart"),
      time: document.getElementById("time"),
      pairs: document.getElementById("pairs"),
      flips: document.getElementById("flips"),
      result: document.getElementById("result"),
      status: document.getElementById("status")
    };

    async function request(path, options = {}) {
      const res = await fetch(API + path, {
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        ...options
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "洞天接口暂时没有回应");
      return data;
    }

    async function loadConfig() {
      try {
        state.config = await request("/config", { method: "GET", headers: undefined });
        state.duration = Number(state.config.config?.game_duration || 90);
        state.minSettleSeconds = Number(state.config.config?.round_min_seconds || 10);
        els.start.disabled = false;
        els.restart.disabled = false;
        setStatus("洞天凭证已就绪。");
        updateStats();
      } catch (err) {
        els.start.disabled = true;
        els.restart.disabled = true;
        showError(err.message || "洞天入口暂时没有回应。");
        setStatus("洞天凭证获取失败，请稍后重进。");
      }
    }

    async function startGame() {
      if (!state.config?.game_token) {
        setStatus("洞天凭证还没准备好，请稍等。");
        return;
      }
      clearTimeout(state.pendingFinishTimer);
      clearResult();
      setStatus("正在开局。");
      els.start.disabled = true;
      els.restart.disabled = true;
      try {
        state.round = await request("/start", {
          method: "POST",
          body: JSON.stringify({ gameToken: state.config.game_token })
        });
      } catch (err) {
        els.start.disabled = false;
        els.restart.disabled = false;
        setStatus(err.message || "开局失败，请稍后再试。");
        showError(err.message || "开局失败，请稍后再试。");
        return;
      }
      state.cards = state.round.cards || [];
      state.open = [];
      state.matched = new Set();
      state.flips = 0;
      state.startedAt = Date.now();
      state.finished = false;
      els.start.disabled = true;
      els.restart.disabled = false;
      els.finish.disabled = false;
      setStatus("翻开相同灵牌，尽量少翻错。");
      renderBoard();
      tick();
      clearInterval(state.timer);
      state.timer = setInterval(tick, 500);
    }

    function renderBoard() {
      els.board.innerHTML = "";
      for (const card of state.cards) {
        const btn = document.createElement("button");
        btn.className = "card";
        btn.type = "button";
        btn.dataset.id = card.id;
        btn.textContent = "";
        btn.addEventListener("click", () => flip(card));
        els.board.appendChild(btn);
      }
      refreshCards();
    }

    function flip(card) {
      if (!state.startedAt || state.finished || state.matched.has(card.id)) return;
      if (state.open.some(item => item.id === card.id) || state.open.length >= 2) return;
      state.open.push(card);
      state.flips += 1;
      refreshCards();
      updateStats();
      if (state.open.length === 2) {
        const [a, b] = state.open;
        if (a.pair_id === b.pair_id) {
          state.matched.add(a.id);
          state.matched.add(b.id);
          state.open = [];
          if (matchedPairs() >= 8) finishGame("completed");
        } else {
          setTimeout(() => {
            state.open = [];
            refreshCards();
          }, 520);
        }
      }
    }

    function refreshCards() {
      for (const btn of els.board.children) {
        const id = Number(btn.dataset.id);
        const card = state.cards.find(item => item.id === id);
        const isOpen = state.open.some(item => item.id === id);
        const isDone = state.matched.has(id);
        btn.classList.toggle("open", isOpen && !isDone);
        btn.classList.toggle("done", isDone);
        btn.textContent = isOpen || isDone ? card.label : "灵";
        btn.disabled = isDone || state.finished;
      }
    }

    function tick() {
      const left = Math.max(0, state.duration - elapsedSeconds());
      els.time.textContent = String(left);
      if (left <= 0 && state.startedAt && !state.finished) finishGame("timeout");
    }

    function matchedPairs() {
      return Math.floor(state.matched.size / 2);
    }

    function elapsedSeconds() {
      if (!state.startedAt) return 0;
      return Math.min(state.duration, Math.floor((Date.now() - state.startedAt) / 1000));
    }

    function updateStats() {
      els.pairs.textContent = `${matchedPairs()}/8`;
      els.flips.textContent = String(state.flips);
      els.time.textContent = String(Math.max(0, state.duration - elapsedSeconds()));
    }

    async function finishGame(reason = "manual") {
      if (!state.round || state.finished) return;
      const wait = secondsUntilSettleReady();
      if (wait > 0) {
        setStatus(`灵牌还没完全归档，还需 ${wait} 秒后才能结算。`);
        if (reason !== "manual") {
          clearTimeout(state.pendingFinishTimer);
          state.pendingFinishTimer = setTimeout(() => finishGame(reason), wait * 1000 + 80);
        }
        return;
      }
      state.finished = true;
      clearInterval(state.timer);
      els.finish.disabled = true;
      els.start.disabled = true;
      els.restart.disabled = true;
      setStatus("正在向洞天校验本局成绩。");
      refreshCards();
      updateStats();
      try {
        const payload = {
          gameToken: state.config.game_token,
          sessionId: state.round.session_id,
          roundToken: state.round.round_token,
          matchedPairs: matchedPairs(),
          flipCount: state.flips,
          elapsedSeconds: elapsedSeconds(),
          completed: matchedPairs() >= 8
        };
        const issued = await request("/finish", { method: "POST", body: JSON.stringify(payload) });
        showResult(issued);
      } catch (err) {
        state.finished = false;
        els.finish.disabled = false;
        els.start.disabled = true;
        els.restart.disabled = true;
        if (isTooEarlyError(err)) {
          setStatus(err.message || "本局结束过快，请稍后再结算。");
          refreshCards();
          return;
        }
        showError(`${err.message || "结算失败"}，可以重试结算本局。`, true);
      }
    }

    function secondsUntilSettleReady() {
      const minSeconds = Math.max(0, Number(state.minSettleSeconds || 0));
      return Math.max(0, minSeconds - elapsedSeconds());
    }

    function isTooEarlyError(error) {
      return String(error?.message || "").includes("结束过快");
    }

    function setStatus(text) {
      els.status.textContent = text;
    }

    function showResult(issued) {
      const code = issued.code || "";
      const rewards = (issued.reward_preview || []).map(item => `<li>${escapeHtml(item)}</li>`).join("") || "<li>本局没有生成可兑换奖励。</li>";
      els.start.disabled = false;
      els.restart.disabled = false;
      els.finish.disabled = true;
      setStatus("兑换码十分钟内有效。");
      els.result.className = "result show";
      els.result.innerHTML = `
        <div class="result-card" role="dialog" aria-modal="true" aria-label="灵牌记忆结算">
          <h2>灵牌归位</h2>
          <p class="result-desc">配对 ${matchedPairs()}/8｜翻牌 ${state.flips}。兑换码十分钟内有效。</p>
          <div class="code-label">洞天兑换码</div>
          <div class="code">${escapeHtml(code)}</div>
          <div class="command">洞天兑换 ${escapeHtml(code)}</div>
          <ul class="rewards">${rewards}</ul>
          <div class="copy-actions">
            <button class="action" type="button" id="copyCommand">复制兑换命令</button>
            <button class="action secondary" type="button" id="copyCode">复制兑换码</button>
          </div>
          <button class="action secondary" type="button" id="againFromResult">再来一局</button>
        </div>
      `;
      document.getElementById("copyCommand").addEventListener("click", event => copyText(event.currentTarget, `洞天兑换 ${code}`, "已复制兑换命令"));
      document.getElementById("copyCode").addEventListener("click", event => copyText(event.currentTarget, code, "已复制兑换码"));
      document.getElementById("againFromResult").addEventListener("click", () => startGame().catch(err => showError(err.message)));
    }

    function showError(message, retry = false) {
      els.result.className = "result show";
      els.result.innerHTML = `
        <div class="result-card" role="dialog" aria-modal="true" aria-label="灵牌记忆结算异常">
          <h2>结算受阻</h2>
          <div class="error">${escapeHtml(message)}</div>
          ${retry ? '<button class="action" type="button" id="retryFinish">结算本局</button>' : '<button class="action secondary" type="button" id="closeResult">知道了</button>'}
        </div>
      `;
      if (retry) {
        document.getElementById("retryFinish")?.addEventListener("click", () => finishGame("manual"));
      } else {
        document.getElementById("closeResult")?.addEventListener("click", clearResult);
      }
    }

    function clearResult() {
      els.result.className = "result";
      els.result.innerHTML = "";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    async function copyText(button, text, copiedText) {
      const original = button.textContent;
      try {
        await writeClipboard(text);
        button.textContent = copiedText;
      } catch {
        button.textContent = "请长按复制";
      }
      window.setTimeout(() => { button.textContent = original; }, 1600);
    }

    async function writeClipboard(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.style.position = "fixed";
      area.style.opacity = "0";
      document.body.appendChild(area);
      area.focus();
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    els.start.addEventListener("click", () => startGame().catch(err => showError(err.message)));
    els.finish.addEventListener("click", () => finishGame("manual"));
    els.restart.addEventListener("click", () => startGame().catch(err => showError(err.message)));
    loadConfig();
  </script>
</body>
</html>
